name: Jira Ticket Validation + Extraction

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  jira-validation:
    name: Validate + Extract Jira Tickets
    runs-on: ubuntu-latest

    steps:
      - name: Validate and Extract Jira Tickets
        uses: actions/github-script@v7
        with:
          script: |
            const jiraRegex = /[A-Z]{2,10}-\d+/gi;
            const invalidMerged = /[A-Z]{2,10}-\d+-\d+/i;

            function extractTickets(text) {
              return [...new Set((text.match(jiraRegex) || []).map(t => t.toUpperCase()))];
            }

            function validate(text) {
              const clean = (text || "").trim();

              core.info(`Checking: ${clean}`);

              // Reject invalid merged tickets like BFRN-1234-1235
              if (invalidMerged.test(clean)) {
                throw new Error("Invalid Jira format: BFRN-1234-1235 is not allowed");
              }

              const tickets = extractTickets(clean);

              // Must contain at least one Jira ticket
              if (tickets.length === 0) {
                throw new Error("Missing Jira ticket (e.g. BFRN-1234)");
              }

              // Echo extracted tickets
              core.info(`Extracted Jira tickets: ${tickets.join(", ")}`);

              return tickets;
            }

            if (context.eventName === "pull_request") {
              const tickets = validate(context.payload.pull_request.title);
              core.info(`PR valid | Tickets: ${tickets.join(", ")}`);
            } else {
              const commits = await github.rest.repos.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.payload.after
              });

              for (const c of commits.data) {
                const tickets = validate(c.commit.message);
                core.info(`Commit valid | Tickets: ${tickets.join(", ")}`);
              }
            }
