name: Jira Enforcement + Auto Format

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches:
      - main

env:
  AUTO_FORMAT: "true"   # set to "false" if you only want validation

jobs:
  jira-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Validate + Normalize Jira Tickets
        uses: actions/github-script@v7
        with:
          script: |
            const jiraRegex = /[A-Z]{2,10}-\d+/gi;
            const invalidMerged = /[A-Z]{2,10}-\d+-\d+/i;

            function extractTickets(text) {
              const matches = text.match(jiraRegex) || [];
              // deduplicate while preserving order
              return [...new Set(matches.map(t => t.toUpperCase()))];
            }

            function validateText(text) {
              if (invalidMerged.test(text)) {
                throw new Error("Invalid Jira format: merged tickets like BFRN-1234-1235 are not allowed");
              }

              const tickets = extractTickets(text);

              if (tickets.length === 0) {
                throw new Error("At least one Jira ticket required (e.g. BFRN-1234)");
              }

              return tickets;
            }

            async function autoFormatPR(title, tickets) {
              if (!process.env.AUTO_FORMAT || process.env.AUTO_FORMAT !== "true") return;

              // remove all Jira tickets from title
              let cleaned = title.replace(jiraRegex, "")
                                 .replace(/[:\-–—]+/g, " ")
                                 .replace(/\s+/g, " ")
                                 .trim();

              const primary = tickets[0];
              const newTitle = `${primary}: ${cleaned || "Update"}`;

              if (title !== newTitle) {
                core.info(`Auto-updating PR title → ${newTitle}`);

                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  title: newTitle
                });
              }
            }

            async function runValidation() {
              const event = context.eventName;

              if (event === "pull_request") {
                const title = context.payload.pull_request.title;

                const tickets = validateText(title);
                await autoFormatPR(title, tickets);

                core.info(`PR valid with tickets: ${tickets.join(", ")}`);
              } 
              else {
                // squash merge / push validation
                const commits = await github.rest.repos.listCommits({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  sha: context.payload.after
                });

                for (const c of commits.data) {
                  const msg = c.commit.message;
                  const tickets = validateText(msg);
                  core.info(`Commit valid: ${tickets.join(", ")}`);
                }
              }
            }

            runValidation().catch(err => {
              core.setFailed(err.message);
            });
