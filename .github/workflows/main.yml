name: Jira Ticket Validation + Extraction

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  jira-validation:
    name: Validate + Extract Jira Tickets
    runs-on: ubuntu-latest

    steps:
      - name: Validate Jira Tickets
        uses: actions/github-script@v7
        with:
          script: |
            const jiraRegex = /[A-Z]{2,10}-\d+/gi;
            const invalidMerged = /[A-Z]{2,10}-\d+-\d+/i;

            function extractTickets(text) {
              return [...new Set((text.match(jiraRegex) || []).map(t => t.toUpperCase()))];
            }

            function validate(text) {
              const clean = (text || "").trim();

              core.info(`Checking: ${clean}`);

              if (invalidMerged.test(clean)) {
                throw new Error("Invalid Jira format: BFRN-1234-1235 is not allowed");
              }

              const tickets = extractTickets(clean);

              if (tickets.length === 0) {
                throw new Error("Missing Jira ticket (e.g. BFRN-1234)");
              }

              core.info(`Extracted Jira tickets: ${tickets.join(", ")}`);

              return tickets;
            }

            // -----------------------------
            // PR VALIDATION
            // -----------------------------
            if (context.eventName === "pull_request") {
              const title = context.payload.pull_request.title;
              const tickets = validate(title);

              core.info(`PR valid | Tickets: ${tickets.join(", ")}`);
            }

            // -----------------------------
            // PUSH (includes squash merge)
            // -----------------------------
            else {
              const commitMessage = context.payload.head_commit?.message || "";

              const tickets = validate(commitMessage);

              core.info(`Commit valid | Tickets: ${tickets.join(", ")}`);
            }
