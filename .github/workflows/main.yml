name: PR Title Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  pr-title-check:
    name: pr-title-check
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title contains Jira ID
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $TITLE"

          # Example: BFRN-1234 (case insensitive)
          if [[ ! "$TITLE" =~ [Bb][Ff][Rr][Nn]-[0-9]+ ]]; then
            echo "PR title must contain Jira ticket like BFRN-1234"
            exit 1
          fi

          echo "PR title is valid"
